server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: redirige /api/* al contenedor del backend.
    # El navegador llama a http://localhost/api/auth/login (mismo origen, sin CORS).
    # Nginx lo reenvía internamente a http://backend:3001/api/auth/login.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Todas las rutas del SPA (React Router) devuelven index.html.
    # Sin esto, refrescar /dashboard daría 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
