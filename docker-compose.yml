version: "3.9"

services:

  # ── Base de datos PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      # Volumen nombrado — Docker lo gestiona en cualquier OS (Windows, Linux, Mac)
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend Node.js / Express ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:      production
      # 'db' es el nombre del servicio de arriba → Docker lo resuelve como hostname
      DATABASE_URL:  postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT:          3001
      # El frontend llega por Nginx en el puerto 80 del mismo host
      FRONTEND_URL:  http://localhost
      CORS_ORIGIN:   "*"
    # No exponemos el puerto al exterior — Nginx accede internamente por la red Docker
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    # Corre las migraciones y luego arranca el servidor en el mismo comando
    command: sh -c "npx prisma migrate deploy && node src/index.js"

  # ── Frontend React servido por Nginx ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # String vacío = Vite genera URLs relativas (/api/...) en el JS compilado
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      # Puerto 80 del host → acceso desde el navegador en http://localhost
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
